steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.backend', '-t', 'gcr.io/$PROJECT_ID/data-analyst-backend', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/data-analyst-backend']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'data-analyst-backend'
      - '--image=gcr.io/$PROJECT_ID/data-analyst-backend'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'
      # Pulls secret from Secret Manager at deploy time (never hardcode secrets in yaml)
      - '--update-secrets=GOOGLE_PLACES_API_KEY=GOOGLE_PLACES_API_KEY:latest'